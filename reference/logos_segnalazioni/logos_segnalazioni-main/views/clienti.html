<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Clienti – CFL</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-100 flex">

<!-- SIDEBAR -->
<aside class="w-64 min-h-screen bg-red-700 text-white flex flex-col">
  <div class="bg-white p-4 flex justify-center">
    <img src="../assets/LogoLogos.png" class="w-full object-contain" alt="Logo Logos">
  </div>

  <nav class="flex-1 mt-6">
    <ul class="space-y-2 text-lg">

      <li>
        <a href="dashboard_admin.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Dashboard
        </a>
      </li>

      <li>
        <a href="utenti.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Utenti
        </a>
      </li>

      <li>
        <a href="appalti.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Appalti
        </a>
      </li>

      <!-- ATTIVA -->
      <li>
        <a href="clienti.html"
           class="block px-6 py-3 bg-white text-red-700 font-semibold rounded-l-full shadow-md">
          Gestione Clienti
        </a>
      </li>

      <li>
        <a href="segnalazioni.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Segnalazioni
        </a>
      </li>

    </ul>
  </nav>
</aside>



  <!-- MAIN -->
  <main class="flex-1 p-6">

    <!-- HEADER -->
    <header class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestione Clienti</h1>
      <button id="btnNuovoCliente"
              class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold shadow">
        + Nuovo Cliente
      </button>
    </header>

    <!-- TABELLA CLIENTI -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b">
          <tr class="text-left text-gray-600">
            <th class="px-4 py-3">Nome</th>
            <th class="px-4 py-3">Email</th>
            <th class="px-4 py-3">Ruolo</th>
            <th class="px-4 py-3">Appalti</th>
            <th class="px-4 py-3">Stato</th>
            <th class="px-4 py-3 text-right">Azioni</th>
          </tr>
        </thead>
        <tbody id="tabellaClienti">

          <tr class="border-b">
            <td class="px-4 py-3 font-medium">Laura Bianchi</td>
            <td class="px-4 py-3">laura.bianchi@cliente.it</td>
            <td class="px-4 py-3">Referente Sicurezza</td>
            <td class="px-4 py-3 space-x-1">
              <span class="px-2 py-1 text-xs rounded bg-blue-100 text-blue-700">Milano</span>
              <span class="px-2 py-1 text-xs rounded bg-blue-100 text-blue-700">Torino</span>
            </td>
            <td class="px-4 py-3">
              <span class="px-3 py-1 text-xs rounded-full bg-green-100 text-green-700">Attivo</span>
            </td>
            <td class="px-4 py-3 text-right space-x-2">
              <button class="px-3 py-1 text-xs bg-yellow-100 text-yellow-700 rounded">Disattiva</button>
              <button class="px-3 py-1 text-xs bg-blue-100 text-blue-700 rounded">Modifica</button>
              <button class="px-3 py-1 text-xs bg-red-100 text-red-700 rounded">Elimina</button>
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </main>

  <!-- MODALE NUOVO CLIENTE -->
  <div id="modalCliente"
       class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">

    <div class="bg-white w-full max-w-md rounded-xl shadow-xl p-6">
      <h2 class="text-xl font-bold text-gray-800 mb-4">Nuovo Cliente</h2>

      <form id="formCliente" class="space-y-4">

        <div>
          <label class="block text-sm font-medium mb-1">Nome *</label>
          <input id="nomeCliente" required
                 class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-500">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Email *</label>
          <input id="emailCliente" type="email" required
                 class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-500">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Ruolo</label>
          <input id="ruoloCliente"
                 class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-500"
                 placeholder="Es. Referente Sicurezza">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Appalti</label>
          <select id="appaltiCliente" multiple
                  class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-500">
            <option>Milano</option>
            <option>Torino</option>
            <option>Bologna</option>
          </select>
          <p class="text-xs text-gray-500 mt-1">Ctrl / Cmd per selezione multipla</p>
        </div>

        <div class="flex justify-end gap-3 pt-2">
          <button type="button" id="chiudiModalCliente"
                  class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">
            Annulla
          </button>
          <button type="submit"
                  class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700">
            Salva
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- JS -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('btnNuovoCliente');
      const modal = document.getElementById('modalCliente');
      const close = document.getElementById('chiudiModalCliente');
      const form = document.getElementById('formCliente');
      const table = document.getElementById('tabellaClienti');

      btn.onclick = () => modal.classList.remove('hidden');
      close.onclick = () => modal.classList.add('hidden');
      modal.onclick = e => { if (e.target === modal) modal.classList.add('hidden'); };

      form.onsubmit = e => {
        e.preventDefault();

        const nome = nomeCliente.value;
        const email = emailCliente.value;
        const ruolo = ruoloCliente.value || '-';
        const appalti = [...appaltiCliente.selectedOptions].map(o => o.value);

        const badges = appalti.map(a =>
          `<span class="px-2 py-1 text-xs rounded bg-blue-100 text-blue-700">${a}</span>`
        ).join(' ');

        table.insertAdjacentHTML('beforeend', `
          <tr class="border-b">
            <td class="px-4 py-3 font-medium">${nome}</td>
            <td class="px-4 py-3">${email}</td>
            <td class="px-4 py-3">${ruolo}</td>
            <td class="px-4 py-3 space-x-1">${badges}</td>
            <td class="px-4 py-3">
              <span class="px-3 py-1 text-xs rounded-full bg-green-100 text-green-700">Attivo</span>
            </td>
            <td class="px-4 py-3 text-right space-x-2">
              <button class="px-3 py-1 text-xs bg-yellow-100 text-yellow-700 rounded">Disattiva</button>
              <button class="px-3 py-1 text-xs bg-blue-100 text-blue-700 rounded">Modifica</button>
              <button class="px-3 py-1 text-xs bg-red-100 text-red-700 rounded">Elimina</button>
            </td>
          </tr>
        `);

        form.reset();
        modal.classList.add('hidden');
      };
    });
  </script>

</body>
</html>
