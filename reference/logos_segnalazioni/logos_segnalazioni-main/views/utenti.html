<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Utenti – Logos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-100 flex">

<!-- SIDEBAR -->
<aside class="w-64 min-h-screen bg-red-700 text-white flex flex-col">
  <div class="bg-white p-4 flex justify-center">
    <img src="../assets/LogoLogos.png" class="w-full object-contain" alt="Logo Logos">
  </div>

  <nav class="flex-1 mt-6">
    <ul class="space-y-2 text-lg">
      <li>
        <a href="dashboard_admin.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Dashboard
        </a>
      </li>

      <li>
        <a href="utenti.html"
           class="block px-6 py-3 bg-white text-red-700 font-semibold rounded-l-full shadow-md">
          Gestione Utenti
        </a>
      </li>

      <li>
        <a href="appalti.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Appalti
        </a>
      </li>

      <li>
        <a href="clienti.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Clienti
        </a>
      </li>

      <li>
        <a href="segnalazioni.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Segnalazioni
        </a>
      </li>
    </ul>
  </nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6">

  <header class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Gestione Utenti</h1>
    <button
      id="btnNuovoUtente"
      class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold shadow">
      + Nuovo Utente
    </button>
  </header>

  <div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b">
        <tr class="text-left text-gray-600">
          <th class="px-4 py-3">Nome</th>
          <th class="px-4 py-3">Ruolo</th>
          <th class="px-4 py-3">Appalti</th>
          <th class="px-4 py-3">Stato</th>
          <th class="px-4 py-3 text-right">Azioni</th>
        </tr>
      </thead>
      <tbody id="tabellaUtenti"></tbody>
    </table>
  </div>

</main>

<!-- MODALE -->
<div id="modalUtente"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">

  <div class="bg-white w-full max-w-md rounded-xl shadow-xl p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-4">Nuovo Utente</h2>

    <form id="formUtente" class="space-y-4">

      <div>
        <label class="block text-sm font-medium mb-1">Nome *</label>
        <input id="nomeUtente" required class="w-full border rounded-lg px-3 py-2">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Email *</label>
        <input id="emailUtente" type="email" required class="w-full border rounded-lg px-3 py-2">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Ruolo *</label>
        <select id="ruoloUtente" required class="w-full border rounded-lg px-3 py-2">
          <option value="">Seleziona</option>
          <option value="ADMIN">Admin</option>
          <option value="RSPP">RSPP</option>
          <option value="SICUREZZA">Sicurezza</option>
          <option value="SEGNALATORE">Segnalatore</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Appalti</label>
        <select id="appaltiUtente" multiple class="w-full border rounded-lg px-3 py-2"></select>
      </div>

      <div class="text-xs text-gray-500 bg-gray-100 p-2 rounded">
        Password iniziale: <b>1234</b> – cambio obbligatorio al primo accesso
      </div>

      <div class="flex justify-end gap-3">
        <button type="button" id="chiudiModalUtente"
                class="px-4 py-2 rounded-lg bg-gray-200">Annulla</button>
        <button type="submit"
                class="px-4 py-2 rounded-lg bg-red-600 text-white">Salva</button>
      </div>

    </form>
  </div>
</div>

<!-- JS (MODIFICATO SOLO QUI) -->
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const btn = document.getElementById('btnNuovoUtente');
  const modal = document.getElementById('modalUtente');
  const close = document.getElementById('chiudiModalUtente');
  const form = document.getElementById('formUtente');
  const table = document.getElementById('tabellaUtenti');

  btn.onclick = () => modal.classList.remove('hidden');
  close.onclick = () => modal.classList.add('hidden');

  // === CARICA UTENTI ===
  async function caricaUtenti() {
    table.innerHTML = '';

    const res = await fetch('../pages/utenti_list.php');
    const json = await res.json();

    if (!json.ok) {
      alert('Errore caricamento utenti');
      return;
    }

    json.utenti.forEach(u => {
      const badges = u.appalti.map(a =>
        `<span class="px-2 py-1 text-xs rounded bg-blue-100 text-blue-700">${a}</span>`
      ).join(' ');

      table.insertAdjacentHTML('beforeend', `
        <tr class="border-b">
          <td class="px-4 py-3 font-medium">${u.nome}</td>
          <td class="px-4 py-3">${u.ruolo}</td>
          <td class="px-4 py-3">${badges}</td>
          <td class="px-4 py-3">
            <span class="px-3 py-1 text-xs rounded-full ${
              u.stato === 'ATTIVO'
                ? 'bg-green-100 text-green-700'
                : 'bg-red-100 text-red-700'
            }">${u.stato}</span>
          </td>
          <td class="px-4 py-3 text-right space-x-2">
            <button class="px-3 py-1 text-xs bg-yellow-100 text-yellow-700 rounded">Disattiva</button>
            <button class="px-3 py-1 text-xs bg-blue-100 text-blue-700 rounded">Modifica</button>
            <button class="px-3 py-1 text-xs bg-red-100 text-red-700 rounded">Elimina</button>
          </td>
        </tr>
      `);
    });
  }

  // === SUBMIT CREAZIONE UTENTE ===
  form.onsubmit = async e => {
    e.preventDefault();

    const res = await fetch('../pages/utenti_create.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        nome: nomeUtente.value,
        email: emailUtente.value,
        ruolo: ruoloUtente.value,
        appalti: [...appaltiUtente.selectedOptions].map(o => o.value)
      })
    });

    const json = await res.json();

    if (!json.ok) {
      alert(json.error);
      return;
    }

    modal.classList.add('hidden');
    form.reset();
    caricaUtenti();
  };

  // INIT
  caricaUtenti();
});
</script>


</body>
</html>
