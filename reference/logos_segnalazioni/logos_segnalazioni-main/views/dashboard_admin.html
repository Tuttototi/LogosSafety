<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Admin – Logos Segnalazioni</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<script>
  fetch('../app/App_Segnalatore.html')
    .then(res => res.text())
    .then(html => {
      // estrai SOLO il contenuto del body
      const temp = document.createElement('div');
      temp.innerHTML = html;
      const bodyContent = temp.querySelector('body')?.innerHTML || html;

      document.getElementById('app-segnalatore-container').innerHTML = bodyContent;
    })
    .catch(err => {
      console.error('Errore caricamento App_Segnalatore:', err);
    });
</script>

<body class="min-h-screen bg-gray-100 flex">

<!-- SIDEBAR -->
<aside class="w-64 min-h-screen bg-red-700 text-white flex flex-col">
  <div class="bg-white p-4 flex justify-center">
    <img src="../assets/LogoLogos.png" class="w-full object-contain" alt="Logo Logos">
  </div>

  <nav class="flex-1 mt-6">
    <ul class="space-y-2 text-lg">

      <!-- ATTIVA -->
      <li>
        <a href="dashboard_admin.html"
           class="block px-6 py-3 bg-white text-red-700 font-semibold rounded-l-full shadow-md">
          Dashboard
        </a>
      </li>

      <li>
        <a href="utenti.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Utenti
        </a>
      </li>

      <li>
        <a href="appalti.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Appalti
        </a>
      </li>

      <li>
        <a href="clienti.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Clienti
        </a>
      </li>

      <li>
        <a href="segnalazioni.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Segnalazioni
        </a>
      </li>

    </ul>
  </nav>
</aside>




  <!-- MAIN -->
  <main class="flex-1 py-10 px-6 md:px-8 relative">

    <header class="flex justify-between items-center mb-10">
      <span class="text-2xl font-semibold text-gray-800 tracking-tight">Dashboard Admin</span>
      <button
        id="togglePhone"
        class="bg-red-600 text-white px-5 py-2 rounded-lg text-sm hover:bg-red-700 shadow focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-2 transition"
        type="button"
        aria-pressed="false"
      >
        Smartphone
      </button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center">
        <h2 class="text-lg font-bold text-red-600 mb-1">Utenti</h2>
        <p class="text-gray-600 text-center">Gestione utenti</p>
      </div>
      <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center">
        <h2 class="text-lg font-bold text-red-600 mb-1">Appalti</h2>
        <p class="text-gray-600 text-center">Gestione appalti</p>
      </div>
      <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center">
        <h2 class="text-lg font-bold text-red-600 mb-1">Segnalazioni</h2>
        <p class="text-gray-600 text-center">Visualizza segnalazioni</p>
      </div>
    </div>

  </main>

<!-- SMARTPHONE FLOATING -->
<div id="phoneWrapper" class="hidden fixed bottom-6 left-6 z-50">


  <div id="smartphone"
    class="w-[360px] h-[723px] bg-gradient-to-b from-neutral-900 to-black
           rounded-[3.2rem] shadow-[0_25px_60px_rgba(0,0,0,0.45)]
           p-[10px] flex flex-col">

    

    <!-- NOTCH -->
    <div class="flex justify-center mb-2">
      <div class="w-20 h-1.5 bg-gray-600 rounded-full"></div>
    </div>

    <!-- SCHERMO -->
 

      <div class="h-full bg-white rounded-[2.4rem] overflow-hidden">
        <div id="app-segnalatore-container"></div>
      </div>
    </div>

  </div>
</div>


 <!-- JS -->
<script>
  /* ===============================
   TOGGLE VISIBILITÀ PANNELLO
   =============================== */
const toggleBtn = document.getElementById('togglePhone');
const wrapper   = document.getElementById('phoneWrapper');
const phone     = document.getElementById('smartphone');

toggleBtn.addEventListener('click', () => {
  const hidden = wrapper.classList.toggle('hidden');

  toggleBtn.textContent = hidden ? 'Smartphone' : 'Nascondi Smartphone';
  toggleBtn.setAttribute('aria-pressed', hidden ? 'false' : 'true');

  // POSIZIONE INIZIALE: BASSO DESTRA
  if (!hidden) {
    phone.style.position = 'fixed';
    phone.style.left = 'auto';
    phone.style.right = '24px';
    phone.style.top = (window.innerHeight - phone.offsetHeight - 24) + 'px';
  }
});

/* ===============================
   DRAG & DROP
   =============================== */
let dragging = false;
let offsetX = 0;
let offsetY = 0;

// drag agganciato allo schermo interno
const screen = phone.querySelector('.bg-white');

const startDrag = (e) => {
  if (e.target.closest('input, textarea, select, button')) return;

  dragging = true;
  const rect = phone.getBoundingClientRect();
  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;
  document.body.classList.add('select-none');
};

// drag su schermo
screen.addEventListener('mousedown', startDrag);

// drag su scocca
phone.addEventListener('mousedown', startDrag);


  document.body.classList.add('select-none');
;

document.addEventListener('mousemove', (e) => {
  if (!dragging) return;

  phone.style.left = (e.clientX - offsetX) + 'px';
  phone.style.right = 'auto';
  phone.style.top  = (e.clientY - offsetY) + 'px';
});

document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.classList.remove('select-none');
});


  /* ===============================
     VALIDAZIONE FORM
     =============================== */
  const form = document.getElementById('segnalazioneForm');

  if (form) {
    form.addEventListener('submit', (e) => {
      let valido = true;

      const check = (id, minLen = 1) => {
        const input = document.getElementById(id);
        const err   = document.getElementById('errore-' + id);
        if (!input || !err) return true;

        if (!input.value || input.value.length < minLen) {
          valido = false;
          err.classList.remove('hidden');
        } else {
          err.classList.add('hidden');
        }
      };

      check('appalto');
      check('titolo', 3);
      check('descrizione', 10);

      if (!valido) e.preventDefault();
    });

    ['appalto', 'titolo', 'descrizione'].forEach(id => {
      const input = document.getElementById(id);
      const err   = document.getElementById('errore-' + id);
      if (!input || !err) return;

      input.addEventListener('input', () => {
        if (input.value && (id === 'appalto' || input.value.length >= (id === 'titolo' ? 3 : 10))) {
          err.classList.add('hidden');
        }
      });
    });
  }
</script>

</body>
</html>
