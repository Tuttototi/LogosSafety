<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Appalti – CFL</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-100 flex">

<!-- SIDEBAR -->
<aside class="w-64 min-h-screen bg-red-700 text-white flex flex-col">
  <div class="bg-white p-4 flex justify-center">
    <img src="../../assets/logo cfl.png" class="w-full object-contain" alt="Logo CFL">
  </div>

  <nav class="flex-1 mt-6">
    <ul class="space-y-2 text-lg">

      <li>
        <a href="dashboard_admin.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Dashboard
        </a>
      </li>

      <li>
        <a href="utenti.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Utenti
        </a>
      </li>

      <li>
        <a href="appalti.html"
           class="block px-6 py-3 bg-white text-red-700 font-semibold rounded-l-full shadow-md">
          Gestione Appalti
        </a>
      </li>

      <li>
        <a href="clienti.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Clienti
        </a>
      </li>

      <li>
        <a href="segnalazioni.html"
           class="block px-6 py-3 hover:bg-red-800 rounded-l-full transition">
          Gestione Segnalazioni
        </a>
      </li>

    </ul>
  </nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6 relative">

  <!-- HEADER -->
  <header class="flex justify-between items-center mb-6">

    <h1 class="text-2xl font-bold text-gray-800">
      Gestione Appalti
    </h1>

    <div class="flex gap-3 items-center">
      <!-- SLOT PULSANTE SMARTPHONE -->
      <div id="smartphone-button-slot"></div>

      <button
        id="btnNuovoAppalto"
        class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold shadow">
        + Nuovo Appalto
      </button>
    </div>

  </header>

  <!-- TABELLA APPALTI -->
  <div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b">
        <tr class="text-left text-gray-600">
          <th class="px-4 py-3">Nome Appalto</th>
          <th class="px-4 py-3">Stato</th>
          <th class="px-4 py-3">Creato il</th>
          <th class="px-4 py-3 text-right">Azioni</th>
        </tr>
      </thead>

      <tbody id="tabellaAppalti">
        <tr class="border-b">
          <td class="px-4 py-3 font-medium text-gray-800">Appalto Milano</td>
          <td class="px-4 py-3">
            <span class="px-3 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-700">
              Attivo
            </span>
          </td>
          <td class="px-4 py-3 text-gray-600">12/03/2024</td>
          <td class="px-4 py-3 text-right space-x-2">
            <button class="px-3 py-1 text-xs bg-yellow-100 text-yellow-700 rounded">Disattiva</button>
            <button class="px-3 py-1 text-xs bg-blue-100 text-blue-700 rounded">Modifica</button>
            <button class="px-3 py-1 text-xs bg-red-100 text-red-700 rounded">Elimina</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<!-- MODALE NUOVO APPALTO -->
<div id="modalAppalto"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">

  <div class="bg-white w-full max-w-md rounded-xl shadow-xl p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-4">
      Nuovo Appalto
    </h2>

    <form id="formAppalto" class="space-y-4">

      <div>
        <label class="block text-sm font-medium mb-1">Nome Appalto *</label>
        <input id="nomeAppalto" required
               class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-500">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Note</label>
        <textarea id="noteAppalto" rows="3"
                  class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-500"></textarea>
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <button type="button"
                id="chiudiModalAppalto"
                class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">
          Annulla
        </button>

        <button type="submit"
                class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700">
          Salva
        </button>
      </div>

    </form>
  </div>
</div>

<!-- SLOT SMARTPHONE -->
<div id="smartphone-slot"></div>

<!-- JS PAGINA -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('btnNuovoAppalto');
  const modal = document.getElementById('modalAppalto');
  const close = document.getElementById('chiudiModalAppalto');
  const form = document.getElementById('formAppalto');
  const table = document.getElementById('tabellaAppalti');

  btn.onclick = () => modal.classList.remove('hidden');
  close.onclick = () => modal.classList.add('hidden');

  modal.onclick = e => {
    if (e.target === modal) modal.classList.add('hidden');
  };

  form.onsubmit = e => {
    e.preventDefault();

    const nome = nomeAppalto.value;
    const today = new Date().toLocaleDateString('it-IT');

    table.insertAdjacentHTML('beforeend', `
      <tr class="border-b">
        <td class="px-4 py-3 font-medium">${nome}</td>
        <td class="px-4 py-3">
          <span class="px-3 py-1 text-xs rounded-full bg-green-100 text-green-700">Attivo</span>
        </td>
        <td class="px-4 py-3 text-gray-600">${today}</td>
        <td class="px-4 py-3 text-right space-x-2">
          <button class="px-3 py-1 text-xs bg-yellow-100 text-yellow-700 rounded">Disattiva</button>
          <button class="px-3 py-1 text-xs bg-blue-100 text-blue-700 rounded">Modifica</button>
          <button class="px-3 py-1 text-xs bg-red-100 text-red-700 rounded">Elimina</button>
        </td>
      </tr>
    `);

    form.reset();
    modal.classList.add('hidden');
  };
});
</script>

<!-- COMPONENTE SMARTPHONE -->
<script src="../components/smartphone.js"></script>
<script src="../js/access-control.js"></script>

</body>
</html>
