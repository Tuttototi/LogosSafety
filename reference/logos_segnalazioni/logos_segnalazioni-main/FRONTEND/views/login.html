<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login – CFL Segnalazioni</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="w-full max-w-sm bg-white p-6 rounded-xl shadow">
    <img
  src="../../assets/logo cfl.png"
  alt="CFL"
  class="h-14 mx-auto mb-4"
/>

    <h1 class="text-xl font-bold mb-4 text-center">Accesso</h1>

    <!-- FORM LOGIN -->
    <form method="POST" action="/cfl_segnalazioni/BAKEND/pages/login.php" class="space-y-4">


      <div>
        <label class="block text-sm font-medium mb-1">Username *</label>
        <input
          type="text"
          name="username"
          placeholder="nome.cognome"
          required
          class="w-full border rounded-lg px-3 py-2"
        >
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Password *</label>
        <input
          type="password"
          name="password"
          required
          class="w-full border rounded-lg px-3 py-2"
        >
      </div>

      <button
        type="submit"
        class="w-full bg-red-600 text-white py-2 rounded-lg"
      >
        Login
      </button>

    </form>
  </div>

 
</body>
</html>
